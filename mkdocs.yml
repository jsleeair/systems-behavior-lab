site_name: systems-behavior-lab
site_description: Experiments investigating why systems behave the way they do
repo_url: https://github.com/jsleeair/systems-behavior-lab
repo_name: jsleeair/systems-behavior-lab

theme:
  name: material
  features:
    - navigation.instant
    - navigation.sections
    - navigation.tracking
    - content.code.copy
    - toc.integrate

nav:
  - Home: index.md
  - Labs:
        - 00 Build & Binary:
                - 00 Translation Unit: 00-build-and-binary/00-translation-unit.md
                - 01 Weak vs Strong Symbol : 00-build-and-binary/01-weak-vs-strong-symbol.md
                - 02 Static vs Dynamic Link : 00-build-and-binary/02-static-vs-dynamic-link.md
                - 03 plt-got-analysis: 00-build-and-binary/03-plt-got-analysis.md
        - 01 Symbol Resolution:
                - 00 ELF Symbol Table: 01-symbol-resolution/00-elf-symbol-table.md
                - 01 Relocation Process: 01-symbol-resolution/01-relocation-process.md
                - 02 ABI and calling convention: 01-symbol-resolution/02-abi-and-calling-convention.md
        - 02 Memory Hierarchy:
                - 00 Cache Line Effect: 02-memory-hierarchy/00-cache-line-effect.md
                - 01 False Sharing: 02-memory-hierarchy/01-false-sharing.md
                - 02 TLB Effect: 02-memory-hierarchy/02-tlb-effect.md
                - 03 Prefetch and Locality: 02-memory-hierarchy/03-prefetch-and-locality.md
                - 04 Stride vs Cache Miss: 02-memory-hierarchy/04-stride-vs-cache-miss.md
        - 03 OS Boundary:
                - 00 Syscall Cost: 03-os-boundary/00-syscall-cost.md
                - 01 Context Switch: 03-os-boundary/01-context-switch.md
                - 02 mmap vs read: 03-os-boundary/02-mmap-vs-read.md
                - 03 Copy on Write: 03-os-boundary/03-copy-on-write.md
                - 04 Page Fault Cost Breakdown: 03-os-boundary/04-page-fault-cost-breakdown.md
        - 04 Concurrency:
                - 00 Mutex vs Spinloc: 04-concurrency/00-mutex-vs-spinlock.md
                - 01 Memory Ordering: 04-concurrency/01-memory-ordering.md
                - 02 Lock Contention: 04-concurrency/02-lock-contention.md
                - 03 Thread Pool Scaling: 04-concurrency/03-thread-pool-scaling.md
                - 04 Ring Buffer: 04-concurrency/04-ring-buffer.md
                - 05 Producer Consumer Queue: 04-concurrency/05-producer-consumer-queue.md
        - 05 CPU Microarchitecture:
                - 00 Branch Prediction: 05-cpu-microarchitecture/00-branch-prediction.md
                - 01 ILP vs Dependency Chain: 05-cpu-microarchitecture/01-ilp-vs-dependency-chain.md
                - 02 Loop Unrolling: 05-cpu-microarchitecture/02-loop-unrolling.md
                - 03 SIMD vs Scalar: 05-cpu-microarchitecture/03-simd-vs-scalar.md
                - 04 Branchless Code: 05-cpu-microarchitecture/04-branchless-code.md  
        - 06 Performance Analysis: 06-performance-analysis/00-perf-stat-basics.md
  - About: about.md

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.highlight
